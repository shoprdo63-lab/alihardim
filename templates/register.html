{% extends 'base.html' %}

{% block title %}הרשמה | מגן סופר{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus" style="font-size: 4rem; color: var(--amazon-dark);"></i>
                        <h2 class="mt-3">צור חשבון חדש</h2>
                        <p class="text-muted">הצטרף למגן סופר וקבל גישה להטבות בלעדיות</p>
                    </div>
                    
                    {% if error %}
                    <div class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
                    </div>
                    {% endif %}
                    
                    <form method="POST" action="{{ url_for('auth.register') }}">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="first_name" class="form-label">שם פרטי</label>
                                <input type="text" class="form-control" id="first_name" name="first_name" placeholder="שם">
                            </div>
                            <div class="col-md-6">
                                <label for="last_name" class="form-label">שם משפחה</label>
                                <input type="text" class="form-control" id="last_name" name="last_name" placeholder="משפחה">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">אימייל *</label>
                            <input type="email" class="form-control" id="email" name="email" required placeholder="your@email.com">
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">סיסמה *</label>
                            <input type="password" class="form-control" id="password" name="password" required minlength="6" placeholder="לפחות 6 תווים">
                        </div>
                        
                        <div class="mb-3">
                            <label for="password_confirm" class="form-label">אימות סיסמה *</label>
                            <input type="password" class="form-control" id="password_confirm" name="password_confirm" required placeholder="הקלד שוב">
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="terms" required>
                            <label class="form-check-label" for="terms">
                                אני מסכים ל<a href="#">תנאי השימוש</a> ו<a href="#">מדיניות הפרטיות</a>
                            </label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-person-plus"></i> צור חשבון
                        </button>
                    </form>
                    
                    <div class="text-center">
                        <p>כבר יש לך חשבון? <a href="{{ url_for('auth.login') }}">התחבר כאן</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
