{% extends 'base.html' %}

{% block title %}התחברות | מגן סופר{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-circle" style="font-size: 4rem; color: var(--amazon-dark);"></i>
                        <h2 class="mt-3">התחברות</h2>
                        <p class="text-muted">התחבר כדי לשמור מועדפים ולנהל את העגלה</p>
                    </div>
                    
                    <form id="login-form" method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label for="email" class="form-label">אימייל</label>
                            <input type="email" class="form-control" id="email" required placeholder="your@email.com">
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">סיסמה</label>
                            <input type="password" class="form-control" id="password" required placeholder="••••••••">
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">זכור אותי</label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-box-arrow-in-right"></i> התחבר
                        </button>
                        
                        <div class="text-center">
                            <a href="#" class="text-decoration-none">שכחת סיסמה?</a>
                        </div>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <p class="text-muted">אין לך חשבון עדיין?</p>
                        <a href="{{ url_for('auth.register') }}" class="btn btn-outline-primary">
                            <i class="bi bi-person-plus"></i> צור חשבון חדש
                        </a>
                    </div>
                    
                    <!-- Social Login -->
                    <div class="mt-4">
                        <p class="text-center text-muted">או התחבר עם:</p>
                        <div class="d-flex justify-content-center gap-2">
                            <button class="btn btn-outline-dark" onclick="socialLogin('google')">
                                <i class="bi bi-google"></i> Google
                            </button>
                            <button class="btn btn-outline-primary" onclick="socialLogin('facebook')">
                                <i class="bi bi-facebook"></i> Facebook
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Guest Checkout Option -->
            <div class="card mt-3 border-0 bg-light">
                <div class="card-body text-center">
                    <p class="mb-2">רוצה לקנות בלי להתחבר?</p>
                    <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-person-walking"></i> המשך כאורח
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Handle login form
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    // For now, just show alert - in production this would call the backend
    alert('תכונה זו תהיה זמינה בקרוב!\n\nבינתיים, תוכל לקנות ישירות דרך AliExpress.');
    
    // Store user in localStorage for demo
    localStorage.setItem('user', JSON.stringify({email: email, name: email.split('@')[0]}));
    
    // Redirect to home
    window.location.href = '{{ url_for('main.index') }}';
});

function showRegister() {
    alert('הרשמה תהיה זמינה בקרוב!');
}

function socialLogin(provider) {
    alert(`התחברות עם ${provider} תהיה זמינה בקרוב!`);
}

// Check if user is already logged in
document.addEventListener('DOMContentLoaded', function() {
    const user = localStorage.getItem('user');
    if (user) {
        // User is logged in, show message
        console.log('User already logged in:', JSON.parse(user));
    }
});
</script>
{% endblock %}
