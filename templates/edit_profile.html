{% extends 'base.html' %}

{% block title %}ערוך פרופיל | מגן סופר{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-header bg-white">
                    <h4 class="mb-0"><i class="bi bi-pencil-square"></i> ערוך פרטים אישיים</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('main.edit_profile') }}">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="first_name" class="form-label">שם פרטי</label>
                                <input type="text" class="form-control" id="first_name" name="first_name" value="{{ user.first_name or '' }}">
                            </div>
                            <div class="col-md-6">
                                <label for="last_name" class="form-label">שם משפחה</label>
                                <input type="text" class="form-control" id="last_name" name="last_name" value="{{ user.last_name or '' }}">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">אימייל</label>
                            <input type="email" class="form-control" id="email" value="{{ user.email }}" disabled>
                            <div class="form-text">לא ניתן לשנות את כתובת האימייל</div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="phone" class="form-label">טלפון</label>
                            <input type="tel" class="form-control" id="phone" name="phone" value="{{ user.phone or '' }}" placeholder="050-1234567">
                        </div>
                        
                        <hr class="my-4">
                        
                        <h6 class="mb-3"><i class="bi bi-geo-alt"></i> כתובת למשלוח</h6>
                        
                        <div class="mb-3">
                            <label for="address" class="form-label">כתובת</label>
                            <input type="text" class="form-control" id="address" name="address" value="{{ user.address or '' }}" placeholder="רחוב, מספר בית, דירה">
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="city" class="form-label">עיר</label>
                                <input type="text" class="form-control" id="city" name="city" value="{{ user.city or '' }}" placeholder="ירושלים">
                            </div>
                            <div class="col-md-6">
                                <label for="postal_code" class="form-label">מיקוד</label>
                                <input type="text" class="form-control" id="postal_code" name="postal_code" value="{{ user.postal_code or '' }}" placeholder="1234567">
                            </div>
                        </div>
                        
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary flex-grow-1">
                                <i class="bi bi-check-lg"></i> שמור שינויים
                            </button>
                            <a href="{{ url_for('main.profile') }}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg"></i> ביטול
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
